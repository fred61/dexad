<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script defer src="grid.js"></script>
    <script type="text/javascript">
        (function () {
            class Model {
                get(row, col) {
                    return `${row} / ${col}`;
                }
            }
            
            function changeListeningMixin(baseClass) {
                return class extends baseClass {
                    #listeners= [];
                    
                    addListener(listener) {
                        this.#listeners.push(listener)
                    }
                    
                    notifyListeners() {
                        this.#listeners.forEach((listener) => listener.onChange());
                    }
                }
            }
            
            class GridAdapter extends changeListeningMixin(class {}) {
                #model;
                
                constructor(model) {
                    super();
                    this.#model= model;
                }
                
                renderCell(row, col, cell) {
                    let v= this.#model.get(row, col);
                    cell.innerText= v;
                }

                update(row, col, key) {
                    console.log(`model update at ${row}/${col} with ${key}`);
                }
            }
            
            window.onload= () => {
                let o= document.getElementById("theGrid");
                
                if (o instanceof customElements.get('cell-grid')) {
                    o.adapter= new GridAdapter(new Model());
                }

            }
        }
        )();
    </script>
	<style>
		div {
			border: 1px solid black;
			padding: 1px;
			margin: 1px;
        }
        cell-grid.grid1 {
            background-color: bisque;
            width: 350px;
            height: 700px;
        }
        cell-grid.grid2 {
            background-color: aqua;
            width: 120px;
            height: 40px;
        }
	</style>
    <title>Grid Component Test</title>
  </head>
  <body>
    <h1>Grid Component Test</h1>
    <div class="cell"> random text </div>
    <div>
		<cell-grid class="grid1" major=3 minor=3 cellSize=30 id="theGrid" tabindex="1"/>
    </div>
    <div>
		<cell-grid class="grid2" majorRows=1 majorCols="1" minorCols="7" id="theOtherGrid"/>
    </div>

  </body>
</html>
